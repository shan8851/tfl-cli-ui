<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="60" stroke="#e8e8ec" stroke-width="0.5" opacity="0.04"/>
      <line x1="0" y1="0" x2="60" y2="0" stroke="#e8e8ec" stroke-width="0.5" opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0f"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Roundel -->
  <circle cx="600" cy="200" r="65" stroke="#E32017" stroke-width="12" fill="none"/>
  <rect x="520" y="175" width="160" height="50" rx="4" fill="#E32017"/>

  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="52" fill="#e8e8ec">London transport in your terminal</text>

  <!-- Subtitle -->
  <text x="600" y="395" text-anchor="middle" font-family="monospace" font-size="22" fill="#6b6b7b">
    Journey planning · tube status · disruptions · arrivals · bikes
  </text>

  <!-- Install command -->
  <rect x="340" y="440" width="520" height="48" rx="8" fill="#12121a" stroke="#1e1e2a" stroke-width="1"/>
  <text x="370" y="472" font-family="monospace" font-size="20" fill="#6b6b7b">$ </text>
  <text x="394" y="472" font-family="monospace" font-size="20" fill="#e8e8ec">npm install -g @shan8851/tfl-cli</text>

  <!-- URL -->
  <text x="600" y="570" text-anchor="middle" font-family="monospace" font-size="18" fill="#6b6b7b">
    tfl-cli.xyz
  </text>
</svg>
